name: agent-worker
on:
  issues:
    types: [labeled]
concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false
jobs:
  work:
    if: github.event.label.name == 'stage:ready'
    runs-on: [self-hosted, mnesis-mnesis-canonical]
    steps:
      - name: claim
        shell: pwsh
        run: gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label stage:wip --remove-label stage:ready
      - name: worker
        shell: pwsh
        run: pwsh -File D:\Github\_ops\orchestration\run-worker.ps1 -Issue ${{ github.event.issue.number }} -Repo ${{ github.repository }}
