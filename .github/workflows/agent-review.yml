name: agent-review
on:
  pull_request:
    types: [opened, ready_for_review]
jobs:
  review:
    # SECURITY: 本 job 跑在自托管 runner（Muso 本机 Windows），且直接执行
    # D:\Github\_ops\orchestration\run-review.ps1。canonical 是 public 仓，
    # 任何人都能开 fork PR——若不限定 head repo，外部分支只要命名为
    # `agent/*` 就能触发本机执行（自托管 runner 经典事故形态）。
    # 因此第一个条件必须是「PR 来自本仓自身分支」，分支名前缀条件在其后。
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.head_ref, 'agent/') || startsWith(github.head_ref, 'claude/'))
    runs-on: [self-hosted, mnesis-mnesis-canonical]
    steps:
      - name: reviewer
        shell: pwsh
        run: pwsh -File D:\Github\_ops\orchestration\run-review.ps1 -Pr ${{ github.event.pull_request.number }} -Repo ${{ github.repository }}
